spring:
  application:
    name: mindCache

  datasource:
    url: jdbc:postgresql://localhost:5432/mindcache
    username: vault
    password: vault_pass_2024
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate            # Flyway 管理 DDL
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        remove-existing-vector-store-table: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB

server:
  port: 8080
