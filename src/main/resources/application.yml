spring:
  application:
    name: mindCache

  datasource:
    url: jdbc:postgresql://localhost:5432/mindcache
    username: vault
    password: vault_pass_2024
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate            # Flyway 管理 DDL
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v3

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        remove-existing-vector-store-table: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 50MB

server:
  port: 8080

# 自定义业务配置
mindcache:
  upload-dir: ./uploads               # 文件存储根目录（音频/图片），相对于项目根目录

  # 多路融合检索参数（第5周）
  search:
    alpha: 0.5                        # 向量语义权重
    beta: 0.3                         # BM25 关键词权重
    gamma: 0.2                        # 时间衰减权重
    time-decay-lambda: 0.01           # 时间衰减系数（每天衰减率，0.01 ≈ 100天后权重降至0.37）
    default-top-k: 20                 # 默认返回条数
