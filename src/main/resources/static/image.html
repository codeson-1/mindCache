<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>图片录入 — MindCache</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* ---- 上传区域 ---- */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 32px 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.04);
        }
        .upload-zone .placeholder {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .upload-zone .hint {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .upload-zone input[type="file"] {
            display: none;
        }

        /* ---- 预览区 ---- */
        .preview-container {
            display: none;
            text-align: center;
            margin-bottom: 16px;
        }
        .preview-container.visible { display: block; }
        .preview-container img {
            max-width: 100%;
            max-height: 360px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .preview-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        /* ---- 结果 ---- */
        .merged-block {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🖼️ 图片录入</h1>
        <p>上传图片 → OCR 文字提取 + AI 视觉描述 → 自动入库</p>
    </header>

    <!-- 上传区域 -->
    <div class="card">
        <div class="upload-zone" id="uploadZone">
            <div class="placeholder">📷</div>
            <div class="hint">点击选择图片，或拖拽到此处</div>
            <div class="hint" style="margin-top:4px;color:#9ca3af;">支持 PNG / JPG / GIF / WebP &bull; 最大 25MB</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
    </div>

    <!-- 预览 -->
    <div class="card preview-container" id="previewContainer">
        <img id="previewImg" alt="预览">
        <div class="preview-actions">
            <button class="btn btn-primary" id="btnUpload">🔍 分析图片</button>
            <button class="btn btn-outline" id="btnCancel">换一张</button>
        </div>
    </div>

    <!-- 加载 -->
    <div id="spinner" class="spinner">
        <p style="margin-top: 12px; font-size: 0.875rem; color: var(--text-secondary);">
            正在分析图片，请稍候...
        </p>
    </div>

    <!-- 结果 -->
    <div id="resultSection" class="result-section">
        <!-- OCR -->
        <div class="card">
            <div class="result-label">📝 OCR 文字提取</div>
            <div id="ocrText" class="result-text"></div>
        </div>

        <!-- 视觉描述 -->
        <div class="card">
            <div class="result-label">👁️ AI 视觉描述</div>
            <div id="visualDesc" class="result-text"></div>
        </div>

        <!-- 融合后 -->
        <div class="card">
            <div class="result-label">📌 入库文本（融合后）</div>
            <div id="mergedContent" class="result-text merged-block"></div>
        </div>

        <!-- 笔记信息 -->
        <div class="card note-card">
            <div>
                <div class="result-label">✅ 笔记已入库</div>
                <div class="meta">自动双写索引（pgvector + Lucene BM25）</div>
            </div>
            <span id="noteId" class="id-badge"></span>
        </div>

        <button id="btnRetry" class="btn btn-outline" style="margin-bottom: 24px;">
            📷 再传一张
        </button>
    </div>
</div>

<script src="/app.js"></script>
<script>
(function () {

    const $ = (sel) => document.querySelector(sel);
    const uploadZone = $("#uploadZone");
    const fileInput  = $("#fileInput");
    const previewContainer = $("#previewContainer");
    const previewImg  = $("#previewImg");
    const btnUpload   = $("#btnUpload");
    const btnCancel   = $("#btnCancel");
    const spinnerEl   = $("#spinner");
    const resultSec   = $("#resultSection");
    const ocrTextEl   = $("#ocrText");
    const visualDescEl = $("#visualDesc");
    const mergedEl    = $("#mergedContent");
    const noteIdEl    = $("#noteId");
    const btnRetry    = $("#btnRetry");

    let selectedFile = null;

    // ---- 点击上传 ----
    uploadZone.addEventListener("click", () => fileInput.click());

    // ---- 文件选择 ----
    fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (file) showPreview(file);
    });

    // ---- 拖拽上传 ----
    uploadZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadZone.classList.add("dragover");
    });
    uploadZone.addEventListener("dragleave", () => {
        uploadZone.classList.remove("dragover");
    });
    uploadZone.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadZone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) {
            showPreview(file);
        } else {
            MindCache.showToast("请上传图片文件", true);
        }
    });

    // ---- 预览 ----
    function showPreview(file) {
        selectedFile = file;
        const reader = new FileReader();
        reader.onload = (e) => {
            previewImg.src = e.target.result;
            previewContainer.classList.add("visible");
        };
        reader.readAsDataURL(file);
    }

    // ---- 取消 ----
    btnCancel.addEventListener("click", () => {
        selectedFile = null;
        fileInput.value = "";
        previewContainer.classList.remove("visible");
    });

    // ---- 上传分析 ----
    btnUpload.addEventListener("click", () => {
        if (!selectedFile) return;
        handleUpload(selectedFile);
    });

    async function handleUpload(file) {
        previewContainer.classList.remove("visible");
        resultSec.classList.remove("visible");
        spinnerEl.classList.add("visible");

        try {
            const data = await MindCache.uploadFile("/images/upload", file);

            ocrTextEl.textContent = data.ocrText || "（无文字）";
            visualDescEl.textContent = data.visualDescription;
            mergedEl.textContent = data.mergedContent;
            noteIdEl.textContent = data.knowledgeItem.id;

            spinnerEl.classList.remove("visible");
            resultSec.classList.add("visible");

        } catch (err) {
            spinnerEl.classList.remove("visible");
            previewContainer.classList.add("visible");
        }
    }

    // ---- 再传一张 ----
    btnRetry.addEventListener("click", () => {
        resultSec.classList.remove("visible");
        ocrTextEl.textContent = "";
        visualDescEl.textContent = "";
        mergedEl.textContent = "";
        selectedFile = null;
        fileInput.value = "";
    });

})();
</script>

</body>
</html>
